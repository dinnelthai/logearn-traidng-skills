[pytest]
# Pytest配置文件

# 测试路径
testpaths = tests

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=trading
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=90

# 标记
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试

# Python文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 覆盖率配置
[coverage:run]
source = trading
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
